{% extends "base.html" %} {% block content %}
<div class="container shadow-lg mb-4">
  <h4 class="text-center me-2">Create User</h4>
  <div class="row">
    <div class="col-md-8"></div>
    <div class="col-md-4">
      <form id="registerForm" method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label for="mobileNo" class="form-label">Mobile No</label>
          <input
            type="text"
            id="mobileNo"
            name="mobileNo"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <label for="mobileNo" class="form-label">Gender</label>
          <select class="form-control" name="gender">
            <option value="1">Male</option>
            <option value="2">Female</option>
            <option value="3">Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password1" class="form-label">Confirm Password</label>
          <input
            type="password"
            id="password1"
            name="password1"
            class="form-control"
            required
          />
          <span id="errorMessage" style="color: red"></span>
        </div>
        <div class="text-center mt-4 mb-4">
          <button type="submit" class="btn btn-primary">Create User</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
<!-- ✅ end content block separately -->

{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("registerForm");

    if (!form) return; // ✅ prevent JS crash on other pages

    const password = document.getElementById("password");
    const password1 = document.getElementById("password1");
    const errorMessage = document.getElementById("errorMessage");
    form.addEventListener("submit", function (e) {
      if (password.value !== password1.value) {
        e.preventDefault();
        if (errorMessage) {
          errorMessage.textContent = "Passwords do not match!";
        }

        password1.focus();
      } else {
        fetch("{% url 'userList' %}", {
          method: "POST",
          headers: {
            "X-CSRFToken": "{{ csrf_token }}",
          },
          body: new FormData(this),
        })
          .then((res) => res.text())
          .then(() => {
            alert("User saved successfully");
            location.reload();
          });
      }
    });
  });
</script>
{% endblock scripts %}
<!-- ✅ end scripts block separately -->
